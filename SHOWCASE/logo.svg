<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 76">
  <defs>
    <style>@import url('https://fonts.googleapis.com/css2?family=Syne:wght@800&amp;display=swap');</style>
  </defs>

  <!-- Background — remova para fundo transparente -->
